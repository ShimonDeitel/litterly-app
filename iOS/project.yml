name: Litterly
options:
  bundleIdPrefix: com.shimondeitel.litterlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Litterly:
    type: application
    platform: iOS
    sources:
      - path: Litterly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.litterlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Litterly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LitterlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LitterlyTests
      - path: Litterly.storekit
    dependencies:
      - target: Litterly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.litterlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LitterlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LitterlyUITests
    dependencies:
      - target: Litterly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.litterlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Litterly:
    build:
      targets:
        Litterly: all
        LitterlyTests: [test]
        LitterlyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Litterly.storekit
    test:
      config: Debug
      storeKitConfiguration: Litterly.storekit
      targets:
        - LitterlyTests
        - LitterlyUITests
    archive:
      config: Release
